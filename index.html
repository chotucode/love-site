<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Somya ❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow: hidden;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 { color: #ff4d6d; }

button {
    padding: 12px 25px;
    margin: 10px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.yes {
    background: #28a745;
    color: white;
}

.no {
    background: #dc3545;
    color: white;
    position: absolute;
}

#message {
    margin-top: 15px;
    color: #444;
}

/* Love Screen */
#loveScreen {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: #fff0f5;
    top: 0;
    left: 0;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#loveScreen h1 {
    font-size: 45px;
    color: #e6005c;
}

/* Roses */
.rose {
    position: absolute;
    font-size: 40px;
}

.top-left { top: 10px; left: 10px; }
.top-right { top: 10px; right: 10px; }
.bottom-left { bottom: 10px; left: 10px; }
.bottom-right { bottom: 10px; right: 10px; }

</style>
</head>

<body>

<div class="container">
    <h1>Hey Somya (Chotu) 💖</h1>
    <h2>Will you be my girlfriend?</h2>

    <button class="yes" onclick="yesClick()">Yes ❤️</button>
    <button class="no" id="noBtn" onclick="noClick()">No 😢</button>

    <p id="message"></p>
</div>

<!-- Final Screen -->
<div id="loveScreen">
    <div class="rose top-left">🌹</div>
    <div class="rose top-right">🌹</div>
    <div class="rose bottom-left">🌹</div>
    <div class="rose bottom-right">🌹</div>

    <h1>I Love You ❤️</h1>
</div>

<script>
function noClick() {
    document.getElementById("message").innerText = "plsss give me one chnaceeee 🥺";

    // Move button randomly
    const btn = document.getElementById("noBtn");
    const x = Math.random() * window.innerWidth * 0.6;
    const y = Math.random() * window.innerHeight * 0.6;

    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

function yesClick() {
    document.getElementById("loveScreen").style.display = "flex";
}
</script>

</body>
</html>
