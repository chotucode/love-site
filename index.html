<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yay! 🎉</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            color: #ff4d6d;
            font-size: 32px;
        }

        p {
            font-size: 18px;
            color: #444;
        }

        img {
            width: 200px;
            margin: 20px 0;
        }

        #music-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            border: none;
            background: #ff4d6d;
            color: white;
            padding: 10px 15px;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Chotu 💖 you said YES! 🎉</h1>

    <img src="https://media.tenor.com/eNHbizSfVb0AAAAj/lovemode-cute.gif" alt="cute gif">

    <p>You just made me the happiest person alive 💕</p>
    <p>I love you ❤️</p>
</div>

<audio id="bg-music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<button id="music-toggle" onclick="toggleMusic()">🔊</button>

<script>
    // Confetti blast 🎉
    confetti({
        particleCount: 150,
        spread: 100,
        origin: { y: 0.6 }
    });

    // Music control
    const music = document.getElementById("bg-music");
    let playing = false;

    function toggleMusic() {
        if (!playing) {
            music.play();
            playing = true;
        } else {
            music.pause();
            playing = false;
        }
    }
</script>

</body>
</html>
