
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Somya 💖</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    overflow: hidden;
    text-align: center;
}

/* NAME INTRO */
#intro {
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:50px;
    color:#ff4d6d;
    letter-spacing:10px;
}

/* PASSWORD */
#lock {
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* START */
#start {
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* GIFT */
#giftBox {
    font-size:80px;
    display:none;
    cursor:pointer;
}

/* MAIN */
#main {
    display:none;
}

.text {
    position:absolute;
    left:5%;
    top:30%;
    text-align:left;
}

canvas {
    position:absolute;
    top:0;
    left:0;
}

/* SLIDESHOW */
#slideshow {
    position:absolute;
    bottom:20px;
    width:100%;
}

#slideshow img {
    width:120px;
    height:120px;
    border-radius:10px;
    margin:5px;
    transition:0.5s;
}

/* BUTTON */
button {
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#ff4d6d;
    color:white;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro"></div>

<!-- PASSWORD -->
<div id="lock">
    <h2>Enter Secret 💌</h2>
    <input id="pass" placeholder="hint: her name" />
    <button onclick="checkPass()">Unlock</button>
</div>

<!-- START -->
<div id="start">
    <h1>Tap for Surprise 💖</h1>
    <button onclick="showGift()">Start</button>
</div>

<!-- GIFT -->
<div id="giftBox" onclick="openGift()">🎁</div>

<!-- MAIN -->
<div id="main">
    <div class="text">
        <h1 id="typing"></h1>
        <p id="sub"></p>
    </div>

    <canvas id="canvas"></canvas>

    <div id="slideshow">
        <img src="https://picsum.photos/200?1">
        <img src="https://picsum.photos/200?2">
        <img src="https://picsum.photos/200?3">
    </div>
</div>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>

// NAME INTRO
let name = "SOMYA 💖";
let idx = 0;

function showIntro(){
    if(idx < name.length){
        document.getElementById("intro").innerHTML += name[idx++];
        setTimeout(showIntro,150);
    } else {
        setTimeout(()=>{
            document.getElementById("intro").style.display="none";
            document.getElementById("lock").style.display="flex";
        },1000);
    }
}

showIntro();

// PASSWORD
function checkPass(){
    let val = document.getElementById("pass").value.toLowerCase();
    if(val === "somya"){
        document.getElementById("lock").style.display="none";
        document.getElementById("start").style.display="flex";
    } else {
        alert("Wrong 😏 try again");
    }
}

// FLOW
function showGift(){
    document.getElementById("start").style.display="none";
    document.getElementById("giftBox").style.display="block";
}

function openGift(){
    document.getElementById("giftBox").innerHTML="💥";
    setTimeout(()=>{
        giftBox.style.display="none";
        main.style.display="block";
        music.play();
        typeText();
        initHearts();
    },800);
}

// TYPING
let text="Hey Somya 💖";
let sub="Happy Birthday 🎉\nYou are special 💫\nStay happy always 😊";

let i=0,j=0;

function typeText(){
    if(i<text.length){
        typing.innerHTML+=text[i++];
        setTimeout(typeText,100);
    } else typeSub();
}

function typeSub(){
    if(j<sub.length){
        subEl.innerHTML+=sub[j++];
        setTimeout(typeSub,40);
    }
}

let subEl = document.getElementById("sub");

// HEART ANIMATION
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function heart(t){
    return {
        x:16*Math.pow(Math.sin(t),3),
        y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
    };
}

function initHearts(){
    let cx=canvas.width*0.7;
    let cy=canvas.height*0.5;

    for(let i=0;i<800;i++){
        let t=Math.random()*Math.PI*2;
        let p=heart(t);

        particles.push({
            x:cx+p.x*10,
            y:cy+p.y*10,
            size:Math.random()*3,
            color:`hsl(${Math.random()*360},100%,70%)`
        });
    }
    animate();
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle=p.color;
        ctx.fill();
    });

    requestAnimationFrame(animate);
}

// SLIDESHOW
let imgs=document.querySelectorAll("#slideshow img");
let index=0;

setInterval(()=>{
    imgs.forEach(img=>img.style.transform="scale(1)");
    imgs[index].style.transform="scale(1.3)";
    index=(index+1)%imgs.length;
},1500);

</script>

</body>
</html>
